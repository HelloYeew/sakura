name: Build SPIRV Native

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  native_builds:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            build_args: release win-x64
            build_target: win-x64
            artifact_name: Sakura.Framework.SPIRV/build/Release/win-x64/libsakura-spirv.dll

          - os: windows-latest
            build_args: release win-x86
            build_target: win-x86
            artifact_name: Sakura.Framework.SPIRV/build/Release/win-x86/libsakura-spirv.dll

          - os: windows-latest
            build_args: release win-arm64
            build_target: win-arm64
            artifact_name: Sakura.Framework.SPIRV/build/Release/win-arm64/libsakura-spirv.dll

          # Linux
          - os: ubuntu-22.04
            build_args: release linux-x64
            build_target: linux-x64
            artifact_name: Sakura.Framework.SPIRV/build/Release/linux-x64/libsakura-spirv.so

          - os: ubuntu-22.04-arm
            build_args: release linux-arm64
            build_target: linux-arm64
            artifact_name: Sakura.Framework.SPIRV/build/Release/linux-arm64/libsakura-spirv.so

          # macOS (universal binary: arm64 + x86_64)
          - os: macos-latest
            build_args: release osx 'arm64;x86_64'
            build_target: osx
            artifact_name: Sakura.Framework.SPIRV/build/Release/osx/libsakura-spirv.dylib

          # iOS
          - os: macos-latest
            build_args: release ios
            build_target: ios
            artifact_name: Sakura.Framework.SPIRV/build/Release/ios/sakura-spirv.xcframework.zip

          # Android
          - os: ubuntu-22.04
            build_args: release android arm64-v8a
            build_target: android-arm64-v8a
            artifact_name: Sakura.Framework.SPIRV/build/Release/android-arm64-v8a/libsakura-spirv.so

          - os: ubuntu-22.04
            build_args: release android armeabi-v7a
            build_target: android-armeabi-v7a
            artifact_name: Sakura.Framework.SPIRV/build/Release/android-armeabi-v7a/libsakura-spirv.so

          - os: ubuntu-22.04
            build_args: release android x86_64
            build_target: android-x86_64
            artifact_name: Sakura.Framework.SPIRV/build/Release/android-x86_64/libsakura-spirv.so

          - os: ubuntu-22.04
            build_args: release android x86
            build_target: android-x86
            artifact_name: Sakura.Framework.SPIRV/build/Release/android-x86/libsakura-spirv.so

    name: ${{ matrix.build_target }} Native Build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set ANDROID_NDK_ROOT
        if: startsWith(matrix.build_target, 'android')
        run: |
          NDK_PATH=$(ls -d ${ANDROID_SDK_ROOT}/ndk/* 2>/dev/null | sort -V | tail -1)
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

      - name: Sync shaderc (Windows)
        working-directory: Sakura.Framework.SPIRV
        shell: cmd
        run: ext\sync-shaderc.cmd
        if: runner.os == 'Windows'

      - name: Sync shaderc (non-Windows)
        working-directory: Sakura.Framework.SPIRV
        shell: bash
        run: bash ext/sync-shaderc.sh
        if: runner.os != 'Windows'

      - name: Build ${{ matrix.build_target }} native library
        working-directory: Sakura.Framework.SPIRV
        shell: cmd
        run: build-native.cmd ${{ matrix.build_args }}
        if: runner.os == 'Windows'

      - name: Build ${{ matrix.build_target }} native library (non-Windows)
        working-directory: Sakura.Framework.SPIRV
        shell: bash
        run: bash build-native.sh ${{ matrix.build_args }}
        if: runner.os != 'Windows'

      - name: Compress iOS framework for upload
        if: ${{ matrix.build_target == 'ios' }}
        working-directory: Sakura.Framework.SPIRV
        shell: bash
        run: |
          cp -r build/Release/ios/sakura-spirv.xcframework .
          zip -r build/Release/ios/sakura-spirv.xcframework.zip sakura-spirv.xcframework

      - name: Upload ${{ matrix.build_target }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build_target }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  create_pr:
    name: Combine and Create PR
    runs-on: macos-latest
    needs: native_builds
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Distribute binaries
        run: |
          SPIRV_BUILD="Sakura.Framework.SPIRV/build/Release"
          FW_RUNTIMES="Sakura.Framework/runtimes"

          distribute() {
            local src_file=$1
            local rid=$2
            local filename=$3

            mkdir -p "$SPIRV_BUILD/$rid"
            cp "$src_file" "$SPIRV_BUILD/$rid/$filename"

            mkdir -p "$FW_RUNTIMES/$rid/native"
            cp "$src_file" "$FW_RUNTIMES/$rid/native/$filename"
          }

          # Windows
          distribute artifacts/win-x64/libsakura-spirv.dll win-x64 libsakura-spirv.dll
          distribute artifacts/win-x86/libsakura-spirv.dll win-x86 libsakura-spirv.dll
          distribute artifacts/win-arm64/libsakura-spirv.dll win-arm64 libsakura-spirv.dll

          # Linux
          distribute artifacts/linux-x64/libsakura-spirv.so linux-x64 libsakura-spirv.so
          distribute artifacts/linux-arm64/libsakura-spirv.so linux-arm64 libsakura-spirv.so

          # macOS
          distribute artifacts/osx/libsakura-spirv.dylib osx libsakura-spirv.dylib

          # iOS xcframework (framework bundle — different handling)
          mkdir -p "$SPIRV_BUILD/ios"
          unzip -qq artifacts/ios/sakura-spirv.xcframework.zip -d "$SPIRV_BUILD/ios"
          mkdir -p "$FW_RUNTIMES/ios/native"
          cp -r "$SPIRV_BUILD/ios/sakura-spirv.xcframework" "$FW_RUNTIMES/ios/native/"

          # Android
          distribute artifacts/android-arm64-v8a/libsakura-spirv.so android-arm64 libsakura-spirv.so
          distribute artifacts/android-armeabi-v7a/libsakura-spirv.so android-arm libsakura-spirv.so
          distribute artifacts/android-x86_64/libsakura-spirv.so android-x64 libsakura-spirv.so
          distribute artifacts/android-x86/libsakura-spirv.so android-x86 libsakura-spirv.so

      - name: Commit and push PR branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b update-spirv-binaries

          git add Sakura.Framework.SPIRV/build/
          git add Sakura.Framework/runtimes/

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping."
          else
            git commit -m "Update Sakura.Framework.SPIRV native binaries" \
              -m "Co-authored-by: HelloYeew <68165621+HelloYeew@users.noreply.github.com>"
            git push --force origin update-spirv-binaries
          fi
