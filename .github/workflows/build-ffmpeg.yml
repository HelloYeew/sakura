name: Build Custom FFmpeg

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install nasm

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-macos.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macOS-${{ matrix.arch }}
          path: macOS-${{ matrix.arch }}

  build-win:
    name: Build Windows
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install nasm mingw-w64

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-win.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: win-${{ matrix.arch }}

  build-win-arm64:
    name: Build Windows (arm64)
    runs-on: ubuntu-22.04
    container:
      image: mstorsjo/llvm-mingw:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-win.sh
        env:
          arch: arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64
          path: win-arm64

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [ x64, arm64 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install nasm pkg-config libva-dev libvdpau-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-linux.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: linux-${{ matrix.arch }}

  deploy-pr:
    name: Combine and Create PR
    runs-on: macos-latest
    needs: [build-macos, build-win, build-win-arm64, build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download all artifacts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Process and Distribute Binaries
        run: |
          # 1. Combine macOS binaries into Universal dylibs
          mkdir -p macOS-universal
          for f in artifacts/macOS-arm64/*.dylib; do
              filename=$(basename "$f")
              if [ -f "artifacts/macOS-x86_64/$filename" ]; then
                  lipo -create -output "macOS-universal/$filename" "$f" "artifacts/macOS-x86_64/$filename"
              else
                  cp "$f" "macOS-universal/$filename"
              fi
          done

          # 2. Define our two target base directories
          TARGET_A="Sakura.Framework/runtimes"
          TARGET_B="Sakura.Framework.NativeLibraries/runtimes"

          # 3. Helper function to copy to both destinations
          distribute() {
            local src=$1
            local dest=$2
            mkdir -p "$TARGET_A/$dest/native"
            mkdir -p "$TARGET_B/$dest/native"
            cp -a "$src/." "$TARGET_A/$dest/native/"
            cp -a "$src/." "$TARGET_B/$dest/native/"
          }

          # 4. Route all binaries to their respective architecture folders
          distribute "macOS-universal" "osx"
          distribute "artifacts/linux-x64" "linux-x64"
          distribute "artifacts/linux-arm64" "linux-arm64"
          distribute "artifacts/win-x64" "win-x64"
          distribute "artifacts/win-x86" "win-x86"
          distribute "artifacts/win-arm64" "win-arm64"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update Native FFmpeg Binaries"
          title: "Update Native FFmpeg Binaries (GitHub Actions)"
          body: "Auto-generated PR injecting custom FFmpeg binaries into both Sakura.Framework and Sakura.Framework.NativeLibraries."
          branch: "update-ffmpeg-binaries"
          delete-branch: true
