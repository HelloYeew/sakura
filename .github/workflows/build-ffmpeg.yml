name: Build Custom FFmpeg

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install nasm

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-macos.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: macOS-${{ matrix.arch }}
          path: macOS-${{ matrix.arch }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, simulator-arm64, simulator-x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install gas-preprocessor
        run: |
          brew install nasm
          curl -L https://raw.githubusercontent.com/FFmpeg/gas-preprocessor/master/gas-preprocessor.pl \
            -o /usr/local/bin/gas-preprocessor.pl
          chmod +x /usr/local/bin/gas-preprocessor.pl

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-iOS.sh
        env:
          arch: ${{ matrix.arch }}
          GAS_PREPROCESSOR: /usr/local/bin/gas-preprocessor.pl

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: iOS-${{ matrix.arch }}
          path: iOS-${{ matrix.arch }}

  build-win:
    name: Build Windows
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install nasm mingw-w64

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-win.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: win-${{ matrix.arch }}
          path: win-${{ matrix.arch }}

  build-win-arm64:
    name: Build Windows (arm64)
    runs-on: ubuntu-22.04
    container:
      image: mstorsjo/llvm-mingw:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-win.sh
        env:
          arch: arm64

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: win-arm64
          path: win-arm64

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install nasm pkg-config libva-dev libvdpau-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-linux.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: linux-${{ matrix.arch }}

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install nasm

      - name: Set ANDROID_NDK_ROOT
        run: |
          NDK_PATH=$(ls -d ${ANDROID_SDK_ROOT}/ndk/* 2>/dev/null | sort -V | tail -1)
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

      - name: Build
        run: bash Sakura.Framework.NativeLibraries/script/ffmpeg/build-android.sh
        env:
          arch: ${{ matrix.arch }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.arch }}
          path: android-${{ matrix.arch }}

  deploy-pr:
    name: Combine and Create PR
    runs-on: macos-latest
    needs: [build-macos, build-ios, build-win, build-win-arm64, build-linux, build-android]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Process and Distribute Binaries
        run: |
          TARGET="Sakura.Framework.NativeLibraries/runtimes"

          distribute() {
            local src=$1
            local dest=$2
            mkdir -p "$TARGET/$dest/native"
            cp -a "$src/." "$TARGET/$dest/native/"
          }

          # macOS universal
          mkdir -p macOS-universal
          for f in artifacts/macOS-arm64/*.dylib; do
              filename=$(basename "$f")
              if [ -f "artifacts/macOS-x86_64/$filename" ]; then
                  lipo -create -output "macOS-universal/$filename" "$f" "artifacts/macOS-x86_64/$filename"
              else
                  cp "$f" "macOS-universal/$filename"
              fi
          done
          distribute "macOS-universal" "osx"

          # Stage iOS device slice
          cp -r artifacts/iOS-arm64 iOS-arm64

          # Combine iOS simulator slices (arm64 + x86_64) into universal
          mkdir -p iOS-simulator-universal
          for f in artifacts/iOS-simulator-arm64/*.dylib; do
              filename=$(basename "$f")
              if [ -f "artifacts/iOS-simulator-x86_64/$filename" ]; then
                  lipo -create -output "iOS-simulator-universal/$filename" \
                    "$f" "artifacts/iOS-simulator-x86_64/$filename"
              else
                  cp "$f" "iOS-simulator-universal/$filename"
              fi
          done

          # Create xcframeworks from device + simulator-universal slices
          bash Sakura.Framework.NativeLibraries/script/ffmpeg/create-xcframeworks.sh

          mkdir -p "$TARGET/ios/native"
          cp -r iOS-xcframework/. "$TARGET/ios/native/"

          # Desktop
          distribute "artifacts/linux-x64" "linux-x64"
          distribute "artifacts/linux-arm64" "linux-arm64"
          distribute "artifacts/win-x64" "win-x64"
          distribute "artifacts/win-x86" "win-x86"
          distribute "artifacts/win-arm64" "win-arm64"

          # Android
          distribute "artifacts/android-armeabi-v7a" "android-arm"
          distribute "artifacts/android-arm64-v8a" "android-arm64"
          distribute "artifacts/android-x86" "android-x86"
          distribute "artifacts/android-x86_64" "android-x64"

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b update-ffmpeg-binaries

          git add Sakura.Framework.NativeLibraries/runtimes/

          if git diff --staged --quiet; then
            echo "No changes in native libraries detected. Skipping push."
          else
            git commit -m "Update Native FFmpeg Binaries" -m "Co-authored-by: HelloYeew <68165621+HelloYeew@users.noreply.github.com>"
            git push --force origin update-ffmpeg-binaries
          fi
